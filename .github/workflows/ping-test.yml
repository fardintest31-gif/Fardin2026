name: Ping Test

on:
  workflow_dispatch:

jobs:
  ping-sites:
    runs-on: ubuntu-latest

    steps:
      - name: Create ping test
        run: |
          echo "Ping Test Results" > ping_results.txt
          echo "Date: $(date)" >> ping_results.txt
          echo "------------------------" >> ping_results.txt

          echo "" >> ping_results.txt
          echo "Telegram:" >> ping_results.txt
          ping -c 5 telegram.org >> ping_results.txt

          echo "" >> ping_results.txt
          echo "Pinterest:" >> ping_results.txt
          ping -c 5 pinterest.com >> ping_results.txt

          echo "" >> ping_results.txt
          echo "YouTube:" >> ping_results.txt
          ping -c 5 youtube.com >> ping_results.txt

          echo "" >> ping_results.txt
          echo "TikTok:" >> ping_results.txt
          ping -c 5 tiktok.com >> ping_results.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ping-results
          path: ping_results.txt
          
